<!DOCTYPE html>
<html lang="vi">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta http-equiv="X-UA-Compatible" content="ie=edge">
	<link rel="shortcut icon" href="img/favicon.ico" />

	<title>Thế giới điện thoại - Giỏ hàng</title>

	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css"
	 crossorigin="anonymous">

	<link rel="stylesheet" href="css/style.css">
	<link rel="stylesheet" href="css/topnav.css">
	<link rel="stylesheet" href="css/header.css">
	<link rel="stylesheet" href="css/taikhoan.css">
	<link rel="stylesheet" href="css/gioHang.css">
	<link rel="stylesheet" href="css/footer.css">
	<script src="data/products.js"></script>
	<script src="js/classes.js"></script>
	<script src="js/dungchung.js"></script>
	<script src="js/giohang.js"></script>

    <style>
        /* CSS bổ sung cho form thanh toán */
        #checkoutForm {
            display: none;
            max-width: 700px;
            margin: 30px auto;
            padding: 25px;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: #fff;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        #checkoutForm h2 { text-align: center; color: #333; margin-bottom: 20px; }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; margin-bottom: 5px; font-weight: bold; }
        .input-group input, .input-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        .btn-confirm { background-color: #17c671; color: white; border: none; padding: 12px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn-confirm:hover { background-color: #14ad62; }

        /* --- CSS THÊM MỚI CHO PHẦN PHƯƠNG THỨC THANH TOÁN --- */
        .payment-details {
            display: none; /* Ẩn mặc định */
            margin-top: 15px;
            margin-bottom: 15px;
            padding: 15px;
            border: 1px dashed #ccc;
            background-color: #f9f9f9;
            border-radius: 4px;
        }
        .payment-details.active {
            display: block; /* Hiện khi được thêm class active */
        }
        .qr-code { text-align: center; }
        .qr-code img { max-width: 200px; margin-top: 10px; }
    </style>
</head>

<body>
	<script> addTopNav(); </script>

	<section style="min-height: 85vh">
		<script> addHeader(); </script>

		<table class="listSanPham"> </table>

        <div id="checkoutForm">
            <h2>Thông Tin Giao Hàng</h2>
            
            <div class="input-group">
                <label for="tenkh">Tên khách hàng:</label>
                <input type="text" id="tenkh" placeholder="Nhập tên người nhận hàng">
            </div>

            <div class="input-group">
                <label for="diachi">Địa chỉ nhận hàng:</label>
                <input type="text" id="diachi" placeholder="Số nhà, tên đường, phường/xã, quận/huyện...">
            </div>
            <div class="input-group">
                <label for="sdt">Số điện thoại liên lạc:</label>
                <input type="tel" id="sdt" placeholder="Nhập số điện thoại của bạn">
            </div>
            
            <div class="input-group">
                <label for="phuongthuc">Phương thức thanh toán:</label>
                <select id="phuongthuc" onchange="hienThiChiTietThanhToan()">
                    <option value="cod">Thanh toán khi nhận hàng (COD)</option>
                    <option value="card">Thanh toán bằng thẻ Ngân hàng / Visa</option>
                    <option value="qrcode">Quét mã QR Code (Momo/ZaloPay/App Ngân hàng)</option>
                </select>
            </div>

            <div id="payment-card" class="payment-details">
                <h4><i class="fa fa-credit-card"></i> Thông tin thẻ:</h4>
                <div class="input-group">
                    <input type="text" placeholder="Số thẻ">
                </div>
                <div class="input-group">
                    <input type="text" placeholder="Tên in trên thẻ">
                </div>
                <div class="input-group" style="display: flex; gap: 10px;">
                    <input type="text" placeholder="Ngày hết hạn (MM/YY)">
                    <input type="text" placeholder="Mã CVV">
                </div>
            </div>
            
            <div id="payment-qrcode" class="payment-details qr-code">
                    <h4><i class="fa fa-qrcode"></i> Quét mã QR bằng App Ngân hàng:</h4>
                    
                    <img id="img-qrcode" src="" alt="Mã QR Vietcombank" style="max-width: 250px; border: 1px solid #ddd; border-radius: 8px; padding: 5px;">
                    
                    <div style="text-align: left; margin: 15px auto; max-width: 300px; padding: 10px; background: #f1f1f1; border-radius: 5px; border-left: 5px solid #00703c;">
                        <p>Ngân hàng: <b>Vietcombank (VCB)</b></p>
                        <p>Số tài khoản: <b>9962877252</b></p>
                        <p>Chủ TK: <b>LA MINH QUAN</b></p>
                        <p>Số tiền: <b id="qr-amount" style="color: red; font-size: 1.1em;">0 ₫</b></p>
                        <p>Nội dung: <b id="nd-chuyenkhoan" style="color: blue;"></b></p>
                    </div>
                </div>

            <button class="btn-confirm" onclick="xacNhanThanhToan()">XÁC NHẬN ĐẶT HÀNG</button>
        </div>
		
	</section> <script>
		addContainTaiKhoan();
	</script>

	<div class="footer"><script>addFooter();</script></div>

	<i class="fa fa-arrow-up" id="goto-top-page" onclick="gotoTop()"></i>
</body>

</html>
